[build]
  command = "rm -rf unpacked && mkdir unpacked && unzip -q photopost-app.zip -d unpacked"
  publish = "unpacked/PhotoPost-AI-Netlify/public"
  functions = "unpacked/PhotoPost-AI-Netlify/netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200
  force = true

[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    X-Frame-Options = "SAMEORIGIN"
